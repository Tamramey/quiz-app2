<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お蕎麦在庫管理 | 在庫一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body data-page="inventory">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">業務用在庫管理</p>
          <h1>お蕎麦在庫管理</h1>
        </div>
        <nav class="topnav" aria-label="メインナビゲーション">
          <a class="nav-link" href="index.html" data-nav-target="index.html" data-nav-message="ダッシュボードを表示しています">ダッシュボード</a>
          <a class="nav-link active" href="inventory.html" data-nav-target="inventory.html" data-nav-message="在庫一覧を表示しています">在庫一覧</a>
          <a class="nav-link" href="register.html" data-nav-target="register.html" data-nav-message="入出庫登録画面を開きます">入出庫登録</a>
        </nav>
      </header>

      <main class="inventory-page">
        <section class="page-header">
          <div>
            <p class="section-label">在庫の状況</p>
            <h2>在庫一覧</h2>
          </div>
          <div class="page-actions">
            <button class="secondary-btn">絞り込み</button>
            <a class="primary-btn" href="register.html" data-nav-target="register.html" data-nav-message="入出庫登録画面を開きます">＋ 入出庫登録</a>
          </div>
        </section>

        <section class="table-card" aria-label="在庫一覧テーブル">
          <div class="table-header">
            <h3>現在の在庫</h3>
            <a class="text-link" href="index.html" data-nav-target="index.html" data-nav-message="ダッシュボードを表示しています">ダッシュボードに戻る</a>
          </div>

          <div class="table-wrapper">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>品目</th>
                  <th>現在数</th>
                  <th>最低在庫</th>
                  <th>状態</th>
                  <th>最終更新</th>
                </tr>
              </thead>
              <tbody id="inventory-body">
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
